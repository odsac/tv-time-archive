<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توليد الأرشيف الدائم - TV Time</title>
    <style>
        body { font-family: sans-serif; background-color: #0c0c0e; color: #f5f5f7; padding: 20px; text-align: center; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; background: #16161a; padding: 30px; border-radius: 12px; border: 1px solid #232329; }
        h1 { color: #ffcc00; font-size: 24px; }
        .btn { background: #ffcc00; color: #0c0c0e; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        .status { margin: 20px 0; font-weight: bold; color: #00cc66; }
        textarea { width: 100%; height: 300px; background: #0c0c0e; color: #00ffcc; border: 1px solid #232329; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; text-align: left; direction: ltr; margin-top: 15px; display: none; }
        .copy-btn { background: #00cc66; color: white; display: none; margin: 15px auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 محرك دمج وتثبيت الأرشيف التاريخي</h1>
    <p>اضغطي على الزر بالأسفل وحددي ملفات الـ CSV الأربعة معاً ليقوم المتصفح بتوليد كود أرشيفكِ الصافي فوراُ.</p>
    
    <input type="file" id="fileInput" multiple accept=".csv" style="display:none;">
    <button class="btn" onclick="document.getElementById('fileInput').click()">احترار ورفع الملفات الأربعة</button>
    
    <div class="status" id="status">بانتظار الملفات...</div>
    
    <button class="btn copy-btn" id="copyBtn" onclick="copyCode()">📋 اضغطي هنا لنسخ كود الأرشيف الجاهز</button>
    <textarea id="outputTxt" readonly></textarea>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const files = e.target.files;
        if(!files || files.length === 0) return;

        let filesProcessed = 0;
        let fileDataMap = {};
        document.getElementById('status').innerText = "جاري الدمج وفك الأكواد المشفرة... ⏳";

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            const name = file.name.toLowerCase();

            reader.onload = function(evt) {
                const text = evt.target.result;
                const lines = text.split('\n');
                let parsedRows = [];

                for(let j=1; j<lines.length; j++) {
                    if(!lines[j].trim()) continue;
                    let cols = lines[j].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^["']|["']$/g, '').trim());
                    parsedRows.push(cols);
                }

                if (name.includes('episodes')) fileDataMap['episodes'] = parsedRows;
                else if (name.includes('series') && !name.includes('episodes')) fileDataMap['series'] = parsedRows;
                else if (name.includes('movie')) fileDataMap['movies'] = parsedRows;
                else if (name.includes('list')) fileDataMap['lists'] = parsedRows;

                filesProcessed++;
                if (filesProcessed === files.length) {
                    generateFinalJSON(fileDataMap);
                }
            };
            reader.readAsText(file);
        }
    });

    function generateFinalJSON(map) {
        let seriesNames = {};
        if (map['series']) {
            map['series'].forEach(row => {
                if (row.length >= 2) {
                    if (row[0].includes('-')) seriesNames[row[0]] = row[1];
                    else if (row[1].includes('-')) seriesNames[row[1]] = row[0];
                }
            });
        }

        let finalArchive = [];

        if (map['episodes']) {
            map['episodes'].forEach(row => {
                if(row.length < 2) return;
                let originalTitle = row[0];
                let season = row[1] || '?';
                let ep = row[2] || '?';
                let date = row[3] || 'غير محدد';

                let finalTitle = originalTitle;
                if (seriesNames[finalTitle]) finalTitle = seriesNames[finalTitle];

                if (finalTitle && !finalTitle.includes('-')) {
                    let existing = finalArchive.find(x => x.title === finalTitle && x.type === 'show');
                    if (!existing) {
                        finalArchive.push({ type: 'show', title: finalTitle, detail: `الموسم ${season} • الحلقة ${ep}`, date: date });
                    } else {
                        existing.detail = `الموسم ${season} • الحلقة ${ep}`;
                    }
                }
            });
        }

        if (map['movies']) {
            map['movies'].forEach(row => {
                if(row.length === 0) return;
                let col0 = row[0] || '';
                let col1 = row[1] || '';
                let movieTitle = col0;
                let watchDate = col1;

                if (col0.includes('-') && col1 && !col1.includes('-') && isNaN(col1)) {
                    movieTitle = col1;
                    watchDate = row[2] || 'غير محدد';
                }

                if(movieTitle && !movieTitle.includes('-') && movieTitle !== 'undefined') {
                    finalArchive.push({ type: 'movie', title: movieTitle, detail: 'فيلم سينمائي', date: watchDate });
                }
            });
        }

        const txtArea = document.getElementById('outputTxt');
        txtArea.value = JSON.stringify(finalArchive, null, 4);
        txtArea.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('status').innerText = "تم توليد البيانات بنجاح! 🎉";
    }

    function copyCode() {
        const txtArea = document.getElementById('outputTxt');
        txtArea.select();
        document.execCommand('copy');
        alert('تم نسخ كود البيانات! الآن انتقلي للخطوة التالية لتثبيته.');
    }
</script>
</body>
</html>
