<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيفي التاريخي الدائم - TV Time</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #0c0c0e; color: #f5f5f7; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px; background: #16161a; border-radius: 14px; margin-bottom: 25px; border: 1px solid #232329; }
        header h1 { margin: 0; color: #ffcc00; font-size: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #16161a; padding: 20px; border-radius: 14px; text-align: center; border: 1px solid #232329; }
        .stat-card h3 { margin: 0 0 10px 0; color: #a0a0ab; font-size: 14px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #ffcc00; }
        .controls-bar { background: #16161a; padding: 15px; border-radius: 14px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .search-box { flex: 1; }
        .search-box input { width: 100%; padding: 12px; background: #0c0c0e; border: 1px solid #232329; border-radius: 8px; color: white; }
        .filter-tabs { display: flex; gap: 8px; }
        .tab-btn { background: #232329; color: #a0a0ab; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #ffcc00; color: #0c0c0e; }
        .shows-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .show-card { background: #16161a; border-radius: 12px; overflow: hidden; border: 1px solid #232329; display: flex; flex-direction: column; position: relative; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; background: linear-gradient(45deg, #1f1f2e, #16161a); display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; }
        .poster-letter { font-size: 44px; font-weight: bold; color: #ffcc00; opacity: 0.3; }
        .card-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; z-index: 2; }
        .badge-series { background: #007bff; }
        .badge-movie { background: #dc3545; }
        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 14px; font-weight: bold; margin: 0 0 6px 0; color: white; }
        .card-detail { font-size: 12px; color: #ffcc00; margin-bottom: 8px; }
        .card-date { font-size: 11px; color: #71717a; border-top: 1px solid #232329; padding-top: 6px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎬 أرشيفي الفني التاريخي والأبدي - odsac</h1>
    </header>

    <div class="stats-row">
        <div class="stat-card"><h3>المسلسلات والأفلام المؤرشفة</h3><div class="number" id="totalCount">23,256</div></div>
    </div>

    <div class="controls-bar">
        <div class="search-box"><input type="text" id="searchInput" oninput="renderGrid()" placeholder="ابحثي عن اسم مسلسل أو فيلم..."></div>
        <div class="filter-tabs">
            <button class="tab-btn active" id="tabAll" onclick="switchTab('all', this)">الكل</button>
            <button class="tab-btn" id="tabShows" onclick="switchTab('shows', this)">المسلسلات</button>
            <button class="tab-btn" id="tabMovies" onclick="switchTab('movies', this)">الأفلام</button>
        </div>
    </div>

    <div class="shows-grid" id="showsGrid"></div>
</div>

<script>
    const archiveData = [
        {"type":"show","title":"Breaking Bad","detail":"الموسم 5 • الحلقة 16","date":"2024-05-12"},
        {"type":"show","title":"Game of Thrones","detail":"الموسم 8 • الحلقة 6","date":"2023-11-22"},
        {"type":"show","title":"Attack on Titan","detail":"الموسم 4 • الحلقة 28","date":"2024-01-15"},
        {"type":"show","title":"Better Call Saul","detail":"الموسم 6 • الحلقة 13","date":"2024-02-20"},
        {"type":"movie","title":"Interstellar","detail":"فيلم سينمائي","date":"2025-01-05"},
        {"type":"movie","title":"Inception","detail":"فيلم سينمائي","date":"2024-08-11"}
    ];

    let currentFilter = 'all';

    function initArchive() {
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('showsGrid');
        grid.innerHTML = '';
        const searchVal = document.getElementById('searchInput').value.toLowerCase();

        let filtered = archiveData.filter(item => {
            if (currentFilter === 'shows' && item.type !== 'show') return false;
            if (currentFilter === 'movies' && item.type !== 'movie') return false;
            if (searchVal && !item.title.toLowerCase().includes(searchVal)) return false;
            return true;
        });

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'show-card';
            card.innerHTML = `
                <div class="card-badge ${item.type === 'show' ? 'badge-series' : 'badge-movie'}">${item.type === 'show' ? 'مسلسل' : 'فيلم'}</div>
                <div class="poster-wrapper"><div class="poster-letter">${item.title.charAt(0).toUpperCase()}</div></div>
                <div class="card-info">
                    <h4 class="card-title">${item.title}</h4>
                    <div class="card-detail">${item.detail}</div>
                    <div class="card-date">🗓️ ${item.date}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function switchTab(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    window.onload = initArchive;
</script>
</body>
</html>
