<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيفي التاريخي الدائم - TV Time</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #0c0c0e; color: #f5f5f7; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px; background: #16161a; border-radius: 14px; margin-bottom: 25px; border: 1px solid #232329; }
        header h1 { margin: 0; color: #ffcc00; font-size: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #16161a; padding: 20px; border-radius: 14px; text-align: center; border: 1px solid #232329; }
        .stat-card h3 { margin: 0 0 10px 0; color: #a0a0ab; font-size: 14px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #ffcc00; }
        .upload-section { background: #16161a; padding: 30px; border-radius: 14px; text-align: center; border: 2px dashed #ffcc00; margin-bottom: 25px; }
        .btn-upload { background: #ffcc00; color: #0c0c0e; padding: 15px 40px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 10px; }
        .controls-bar { background: #16161a; padding: 15px; border-radius: 14px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .search-box { flex: 1; }
        .search-box input { width: 100%; padding: 12px; background: #0c0c0e; border: 1px solid #232329; border-radius: 8px; color: white; font-size: 16px; }
        .shows-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .show-card { background: #16161a; border-radius: 12px; overflow: hidden; border: 1px solid #232329; display: flex; flex-direction: column; padding: 15px; }
        .card-title { font-size: 14px; font-weight: bold; margin: 0 0 6px 0; color: white; }
        .card-detail { font-size: 12px; color: #ffcc00; margin-bottom: 8px; }
        .card-date { font-size: 11px; color: #71717a; border-top: 1px solid #232329; padding-top: 6px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎬 أرشيفي التاريخي الخاص - odsac</h1>
    </header>

    <div class="stats-row">
        <div class="stat-card"><h3>إجمالي العناصر المؤرشفة</h3><div class="number" id="totalCount">0</div></div>
    </div>

    <div class="upload-section" id="uploadSection">
        <h3>الرجاء الضغط على الزر بالأسفل واختيار ملفات الـ CSV الأربعة الحقيقية</h3>
        <input type="file" id="fileInput" multiple accept=".csv" class="hidden" onchange="handleFiles(this.files)">
        <button class="btn-upload" type="button" onclick="document.getElementById('fileInput').click()">اضغطي هنا واختاري الملفات</button>
    </div>

    <div id="archiveContent" class="hidden">
        <div class="controls-bar">
            <div class="search-box"><input type="text" id="searchInput" oninput="renderGrid()" placeholder="ابحثي في مسلسلاتكِ وأفلامكِ الحقيقية..."></div>
        </div>
        <div class="shows-grid" id="showsGrid"></div>
    </div>
</div>

<script>
    let allData = [];

    function handleFiles(files) {
        if (!files || !files.length) return;
        let filesProcessed = 0;
        allData = []; // تصفير البيانات القديمة

        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();
            reader.onload = function(e) {
                parseCSV(e.target.result);
                filesProcessed++;
                
                if (filesProcessed === files.length) {
                    if (allData.length > 0) {
                        document.getElementById('uploadSection').classList.add('hidden');
                        document.getElementById('archiveContent').classList.remove('hidden');
                        document.getElementById('totalCount').innerText = allData.length.toLocaleString();
                        renderGrid();
                    } else {
                        alert("لم نتمكن من قراءة بيانات داخل الملفات، تأكدي أنها ملفات CSV الصحيحة من TV Time.");
                    }
                }
            };
            reader.readAsText(files[i]);
        }
    }

    function parseCSV(text) {
        const lines = text.split('\n');
        if (lines.length < 2) return;
        const header = lines[0].toLowerCase();
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const parts = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (header.includes('episode_title') || header.includes('episode_number') || header.includes('show_name')) {
                let showTitle = parts[1] ? parts[1].replace(/"/g, '') : (parts[0] ? parts[0].replace(/"/g, '') : 'غير معروف');
                let epNum = parts[2] ? parts[2].replace(/"/g, '') : '';
                let seasonNum = parts[3] ? parts[3].replace(/"/g, '') : '';
                let date = parts[4] ? parts[4].replace(/"/g, '').split(' ')[0] : '';
                
                allData.push({
                    title: showTitle,
                    detail: epNum ? `الموسم ${seasonNum} • الحلقة ${epNum}` : `حلقة مشاهدة`,
                    date: date || 'بدون تاريخ'
                });
            } else if (header.includes('movie_title') || header.includes('movie')) {
                let movieTitle = parts[1] ? parts[1].replace(/"/g, '') : (parts[0] ? parts[0].replace(/"/g, '') : 'غير معروف');
                let date = parts[2] ? parts[2].replace(/"/g, '').split(' ')[0] : '';
                
                allData.push({
                    title: movieTitle,
                    detail: `فيلم سينمائي`,
                    date: date || 'بدون تاريخ'
                });
            }
        }
    }

    function renderGrid() {
        const grid = document.getElementById('showsGrid');
        grid.innerHTML = '';
        const searchVal = document.getElementById('searchInput').value.toLowerCase();

        let filtered = allData.filter(item => {
            return !searchVal || item.title.toLowerCase().includes(searchVal);
        });

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'show-card';
            card.innerHTML = `
                <h4 class="card-title">${item.title}</h4>
                <div class="card-detail">${item.detail}</div>
                <div class="card-date">🗓️ ${item.date}</div>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
